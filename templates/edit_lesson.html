<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать урок</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ffcc00;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #4da6ff;
            text-decoration: none;
            background: #252525;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .back-link:hover {
            background: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ccc;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: border 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ffcc00;
        }
        button {
            background: #ffcc00;
            color: #1a1a1a;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #e6b800;
        }
        .form-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .cancel-btn {
            background: #444;
            color: white;
        }
        .cancel-btn:hover {
            background: #555;
        }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            button { width: 100%; }
            .form-buttons { flex-direction: column; }
        }
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container, .schedule-grid, .week-navigation, .admin-panel {
                padding: 12px;
            }
            h1 {
                font-size: 1.5rem;
                text-align: center;
            }
            .schedule-grid {
                grid-template-columns: 1fr !important;  /* одна колонка на телефонах */
                gap: 15px;
            }
            .week-navigation {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            .month-year {
                font-size: 1rem;
                order: 1;
                width: 100%;
                text-align: center;
            }
            .nav-arrow {
                font-size: 20px;
                padding: 5px 12px;
            }
            .day-card {
                margin: 0;
            }
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
            .form-group input, .form-group select, .form-group textarea {
                font-size: 16px; /* чтобы не было зума на айфонах */
            }
            button, .add-lesson-btn, .bulk-actions button {
                width: 100%;
                margin: 5px 0;
            }
            .bulk-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .selected-counter {
                text-align: center;
                margin: 10px 0;
            }
            .tabs {
                flex-direction: column;
                gap: 5px;
            }
            .tab-btn {
                width: 100%;
                text-align: center;
            }
            video, iframe {
                width: 100%;
                height: auto;
            }
            .modal-content {
                width: 95%;
                margin: 20px auto;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✏️ Редактировать урок</h1>
    <a href="{{ url_for('admin') }}" class="back-link">← Назад к админке</a>

    <form method="post">
        <div class="form-group">
            <label>День недели</label>
            <select name="day_id" required>
                {% for day in days %}
                    <option value="{{ day.id }}" {% if lesson.day_id == day.id %}selected{% endif %}>{{ day.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Неделя (1–52)</label>
            <input type="number" name="week" min="1" max="52" value="{{ lesson.week }}" required>
        </div>

        <div class="form-group">
            <label>Номер урока</label>
            <input type="number" name="lesson_number" min="1" max="8" value="{{ lesson.lesson_number }}" required>
        </div>

        <div class="form-group">
            <label>Предмет</label>
            <select name="subject" required>
                {% for subj in subjects %}
                    <option value="{{ subj.name }}" {% if lesson.subject == subj.name %}selected{% endif %}>{{ subj.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Тема урока</label>
            <input type="text" name="topic" value="{{ lesson.topic }}" required>
        </div>

        <div class="form-group">
            <label>Домашнее задание</label>
            <textarea name="homework" rows="4">{{ lesson.homework }}</textarea>
        </div>

        <div class="form-buttons">
            <a href="{{ url_for('admin') }}" style="text-decoration: none; width: 100%;">
                <button type="button" class="cancel-btn" style="width: 100%;">❌ Отмена</button>
            </a>
            <button type="submit" style="width: 100%;">💾 Сохранить</button>
        </div>
    </form>
</div>
</body>
</html>
